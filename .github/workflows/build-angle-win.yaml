name: build-angle-win

on:
  workflow_dispatch:
    inputs:
      ignore-cache:
        required: false
        type: string
        default: false
  workflow_call:
    inputs:
      ignore-cache:
        required: false
        type: string
        default: false
        
jobs:
  build-win:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Angle version
        id: angle-version
        shell: cmd
        run: |
          @chcp 65001>nul
          zig build print-sha-angle > angle-commit.txt
          set /p ANGLE_COMMIT=<angle-commit.txt
          echo ANGLE_COMMIT=%ANGLE_COMMIT% >> %GITHUB_OUTPUT%

      - name: Cache
        id: cache-angle
        uses: actions/cache@v3
        if: inputs.ignore-cache != 'true'
        with:
          path: build/angle.out
          key: angle-${{ runner.os }}-${{ runner.arch }}-${{ steps.angle-version.outputs.ANGLE_COMMIT }}

      - uses: mlugg/setup-zig@v1
        if: steps.cache-angle.outputs.cache-hit != 'true' || inputs.ignore-cache == 'true'
        with:
          version: 0.14.0

      - name: Build Angle
        if: steps.cache-angle.outputs.cache-hit != 'true' || inputs.ignore-cache == 'true'
        shell: cmd
        run: |
          zig build angle -Doptimize=ReleaseFast

      - uses: actions/upload-artifact@v4
        with:
          name: angle-windows-x64
          path: build/angle.out
